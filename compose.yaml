services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:0.8.10
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
      - WEBUI_NAME=Lifan's AI Chatbot
      - WEBUI_URL="${WEBUI_URL}"
  craft-agents:
    image: ghcr.io/lukilabs/craft-agents-server:0.8.6
    restart: unless-stopped
    ports:
      - "9100:9100"
    environment:
      CRAFT_SERVER_TOKEN: ${CRAFT_SERVER_TOKEN}
      CRAFT_RPC_HOST: 0.0.0.0
    volumes:
      - craft-agents-data:/home/craftagents/.craft-agent
volumes:
  open-webui:
  craft-agents-data:
